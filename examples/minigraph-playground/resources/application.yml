# minigraph-playground example — active knowledge graph (layer 3) on
# event-script (layer 2) on platform-core (layer 1).
application.name: minigraph-playground

# REST automation serves rest.yaml + the static webapp bundle; app.env=dev
# turns on the dev-gated Playground services (each declared with
# #[optional_service("app.env=dev")]). Env-overridable (Java parity:
# ${APP_ENV:dev}) — set APP_ENV=prod to run graphs only through
# POST /api/graph/{graph-id}, with the Playground UI/WS/mocks not loaded.
app.env: ${APP_ENV:dev}
rest.automation: true
rest.server.port: 8100

# Playground draft-graph scratch folder (Java parity: file:/tmp/graph).
location.graph.temp: file:/tmp/graph

# Serializer null handling (Java parity). Default false: Nil map entries are
# omitted from JSON and MsgPack output (e.g. a successful /sync response drops
# the null `error` field), mirroring Gson's default + MsgPack packMap null-skip.
# Set true to transport nulls explicitly for a downstream that needs them.
serializer.null.transport: false

info.app.description: 'mercury MiniGraph Playground (active knowledge graph)'
show.application.properties: 'application.name, app.env, rest.server.port'

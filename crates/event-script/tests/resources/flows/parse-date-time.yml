flow:
  id: 'parse-date-time'
  description: 'Parse a date-time string to milliseconds'
  ttl: 10s
  exception: 'v1.hello.exception'

first.task: 'no.op'

tasks:
  - input:
      - 'f:parseDateTime(input.body.datetime, text(MM/dd/yyyy HH:mm:ss; ms)) -> ms'
    process: 'no.op'
    output:
      - 'text(application/json) -> output.header.content-type'
      - 'result -> output.body'
    description: 'Hello World'
    execution: end

  - input:
      - 'error.code -> status'
      - 'error.message -> message'
      - 'error.stack -> stack'
    process: 'v1.hello.exception'
    output:
      - 'result.status -> output.status'
      - 'result -> output.body'
    description: 'Just a demo exception handler'
    execution: end

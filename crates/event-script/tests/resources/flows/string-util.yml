flow:
  id: 'string-util'
  description: 'Simple String utilities'
  ttl: 10s
  exception: 'v1.hello.exception'

first.task: 'no.op'

tasks:
  - input:
      - 'f:startsWith(input.body.text, text(Hello)) -> starts_with'
      - 'f:endsWith(input.body.text, text(World)) -> ends_with'
      - 'f:startsWith(input.body.text, text(w)) -> not_starts_with'
      - 'f:endsWith(input.body.text, text(H)) -> not_ends_with'
      - 'f:includes(input.body.text, text(test)) -> includes'
      - 'f:includes(input.body.text, text(nothing)) -> not_includes'
      - 'text(abc) -> model.x[]'
      - 'text(xyz) -> model.x[]'
      - 'f:includes(model.x, text(xyz)) -> list_includes'
      - 'f:includes(model.x, text(123)) -> list_not_includes'
    process: 'no.op'
    output:
      - 'text(application/json) -> output.header.content-type'
      - 'result -> output.body'
    description: 'Hello World'
    execution: end

  - input:
      - 'error.code -> status'
      - 'error.message -> message'
      - 'error.stack -> stack'
    process: 'v1.hello.exception'
    output:
      - 'result.status -> output.status'
      - 'result -> output.body'
    description: 'Just a demo exception handler'
    execution: end

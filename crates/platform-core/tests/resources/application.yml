# base configuration — merged after application.properties (later overrides earlier)
merge.order: yaml

profile:
  indicator: base

typed:
  int: 42
  bool: true

subst:
  env: '${PC_TEST_HOME:none}'
  default: '${PC_TEST_MISSING:fallback-value}'
  ref: 'http://${server.host}:${server.port}/x'
  # increment 55 (parity F11): repeated references are NOT cycles
  repeated: '${server.host} ${server.host}'
  diamond: '${subst.ref} on ${server.host}'

looptest:
  a: '${looptest.b}'
  b: '${looptest.a}'

override:
  demo: file

deep:
  list:
    - name: first
    - name: second

demo:
  instances: 3

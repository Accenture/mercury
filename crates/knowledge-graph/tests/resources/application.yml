#
# Test configuration for the knowledge-graph crate — mirrors the keys the
# Java engine's src/test/resources/application.properties sets for the
# CompileGraph tests (rest.server.port feeds the ${rest.server.port}
# substitution inside graph fixtures such as hellojs.json).
#
application.name: 'knowledge-graph-test'
info.app:
  version: '1.0.0'
  description: 'Knowledge graph compiler tests'

rest.server.port: 8090

location.graph.temp: 'file:/tmp/graph'
location.graph.deployed: 'classpath:/graph'
graph.model.automation: 'classpath:/graphs.yaml'
